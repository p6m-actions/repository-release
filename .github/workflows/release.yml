name: Release Repository

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release to create"
        required: true
        default: "minor_release"
        type: choice
        options:
          - "minor_release"
          - "major_branch"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      # Dogfooding: uses token-exchange@main since token-exchange relies on repository-release
      - name: Get P6M YBOR Token
        id: token
        uses: p6m-actions/token-exchange@main

      # Dogfooding: uses this action (./) to release itself
      - name: Run GitHub Repository Release Action
        uses: ./
        with:
          release_type: ${{ github.event.inputs.release_type }}
          github_token: ${{ steps.token.outputs.github_token }}
